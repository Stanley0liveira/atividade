<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carregando ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:linear-gradient(
        180deg,
        #121212,
        #1a1020,
        #121212
    );

    color:white;
    font-family:Arial,sans-serif;
}

.loading-container{
    text-align:center;
    color:white;
    width:90%;
    max-width:400px;
}

.heart{
    font-size:90px;
    animation:pulse 1.5s infinite;
    filter:drop-shadow(0 0 15px #ff4d6d);
}

.progress{
    width:100%;
    height:12px;
    background:#2b2b2b;
    border-radius:20px;
    overflow:hidden;
}

.progress-bar{
    width:0%;
    height:100%;
    background:#ff4d6d;
    border-radius:20px;
}

#percent{
    margin-top:10px;
    font-size:18px;
    font-weight:bold;
}

@keyframes pulse{
    0%,100%{
        transform:scale(1);
    }
    50%{
        transform:scale(1.2);
    }
}
</style>
</head>
<body>

<div class="loading-container">
    <div class="heart">❤️</div>
    <h1>Carregando Amor...</h1>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div id="percent">0%</div>
</div>

<script>
let progresso = 0;

const barra = document.getElementById("bar");
const texto = document.getElementById("percent");

const carregar = setInterval(() => {
    progresso++;

    barra.style.width = progresso + "%";
    texto.innerHTML = progresso + "%";

    if(progresso >= 100){
        clearInterval(carregar);

        // Troque pelo nome da sua página
        window.location.href = "index.html";
    }

}, 40);
</script>

</body>
</html>
